spring.application.name=FakeECommerce
spring.datasource.url=jdbc:mysql://localhost:3306/fakeecommerce
spring.datasource.username=root
spring.datasource.password=Vk@#$2211
spring.jpa.show-sql=true
# Schema is managed by Flyway (src/main/resources/db/migration). Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Use when adopting Flyway on a DB that already has tables but no flyway_schema_history (one-time).
# spring.flyway.baseline-on-migrate=true